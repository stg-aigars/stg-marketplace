name: Build and Push Image

# Builds the production Docker image off-VPS so Coolify can pull-and-run
# instead of build-on-server. The Hetzner CX23 (4 GB RAM) cannot fit the
# Next.js production build alongside the running marketplace + Docker
# daemon + Coolify control plane; GHA runners have ~7 GB free and build
# comfortably.
#
# On push to main: build and push tagged image (sha + latest) to GHCR.
# On PR to main: build only (no push) as a smoke test — catches build
# regressions before merge without polluting the registry.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  # Cancel in-progress only on PR branches; on main we never cancel so every
  # push to main produces a deployable image.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker image (push on main, smoke test on PR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only authenticate when we actually intend to push (main or manual).
        # PR builds are smoke tests; they never push.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main / dispatch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            EVERYPAY_API_USERNAME=${{ secrets.EVERYPAY_API_USERNAME }}
            EVERYPAY_API_SECRET=${{ secrets.EVERYPAY_API_SECRET }}
            EVERYPAY_API_URL=${{ secrets.EVERYPAY_API_URL }}
            EVERYPAY_ACCOUNT_NAME=${{ secrets.EVERYPAY_ACCOUNT_NAME }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
            UNISEND_API_URL=${{ secrets.UNISEND_API_URL }}
            UNISEND_USERNAME=${{ secrets.UNISEND_USERNAME }}
            UNISEND_PASSWORD=${{ secrets.UNISEND_PASSWORD }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_FACEBOOK_LOGIN_ENABLED=${{ secrets.NEXT_PUBLIC_FACEBOOK_LOGIN_ENABLED }}
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      # After the image is in GHCR, ask Coolify to pull and deploy it. The
      # step is tolerant of missing secrets (warns + skips) so the workflow
      # also works if/when the Coolify side is unreachable or being rotated.
      # See `docs/operations/coolify-api-notes.md` for the endpoint.
      - name: Trigger Coolify deploy
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          COOLIFY_HOST: ${{ secrets.COOLIFY_HOST }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          if [ -z "$COOLIFY_TOKEN" ] || [ -z "$COOLIFY_APP_UUID" ] || [ -z "$COOLIFY_HOST" ]; then
            echo "::warning::Coolify deploy trigger skipped (one or more secrets not configured)."
            echo "Configure repository secrets COOLIFY_HOST, COOLIFY_TOKEN, COOLIFY_APP_UUID to enable auto-deploy."
            exit 0
          fi
          echo "Triggering Coolify deploy for app ${COOLIFY_APP_UUID:0:8}..."
          response=$(curl -fsS -X GET \
            "${COOLIFY_HOST}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}")
          echo "Coolify response: $response"
