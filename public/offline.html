<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline | Second Turn Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #FAF9F6;
      color: #2E3440;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      margin-bottom: 1.5rem;
    }
    .icon svg {
      width: 64px;
      height: 64px;
      color: #6BA3B5;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #6BA3B5;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 1rem;
      line-height: 1.5;
      color: #4C566A;
      margin-bottom: 2rem;
    }
    .brand {
      font-size: 0.875rem;
      color: #4C566A;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    button {
      background-color: #D08770;
      color: #FFFFFF;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.25s ease-out;
    }
    button:hover {
      background-color: #C07760;
    }
    button:active {
      background-color: #B06750;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Second Turn Games</div>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0" />
        <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
    </div>
    <h1>You're currently offline</h1>
    <p>Check your connection and try again to browse games.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
