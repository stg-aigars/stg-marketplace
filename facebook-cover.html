<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STG Facebook Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2e3440;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    color: #eceff4;
  }

  .controls {
    margin-bottom: 16px;
    font-size: 13px;
    color: #eceff4aa;
    user-select: none;
  }
  .controls label { cursor: pointer; }

  .cover {
    position: relative;
    width: 820px;
    height: 312px;
    overflow: hidden;
    background-color: #363e4b;
    background-image: url('public/images/hero-bg.webp');
    background-size: cover;
    background-position: center;
  }

  /* Gradient overlay — matches the homepage hero */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(54, 62, 75, 0.80) 0%,
      rgba(54, 62, 75, 0.60) 25%,
      transparent 40%
    );
  }

  .content {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    /* Left edge at 90px = start of mobile safe zone */
    padding: 0 64px 0 90px;
    max-width: 360px;
  }

  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 700;
    font-size: 28px;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
  }

  /* Mobile-safe zone guide (640×312 centered) */
  .safe-zone {
    display: none;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 640px;
    height: 100%;
    border: 2px dashed rgba(255, 255, 255, 0.35);
    pointer-events: none;
  }
  .safe-zone::after {
    content: 'Mobile safe zone (640\D7312)';
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    font-family: sans-serif;
  }

  .safe-zone.visible {
    display: block;
  }

  .hint {
    margin-top: 12px;
    font-size: 12px;
    color: #eceff466;
  }
</style>
</head>
<body>

<div class="controls">
  <label><input type="checkbox" id="safeToggle" onchange="document.querySelector('.safe-zone').classList.toggle('visible', this.checked)"> Show mobile safe zone</label>
</div>

<div class="cover" id="cover">
  <div class="content">
    <h1>Every game deserves a<br>Second Turn</h1>
  </div>
  <div class="safe-zone"></div>
</div>

<p class="hint">820 &times; 312px &mdash; right-click the cover &rarr; Inspect &rarr; right-click node &rarr; "Capture node screenshot"</p>

</body>
</html>
